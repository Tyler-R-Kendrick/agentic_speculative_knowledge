name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/post-start.sh
      - pyproject.toml
      - .devcontainer/devcontainer.json
      - .devcontainer/docker-compose.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/post-start.sh
      - pyproject.toml
      - .devcontainer/devcontainer.json
      - .devcontainer/docker-compose.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      terminusdb:
        image: terminusdb/terminusdb-server:v12.0.5
        ports:
          - 6363:6363
        env:
          TERMINUSDB_SERVER_USER: admin
          TERMINUSDB_SERVER_PASSWORD: root
          TERMINUSDB_LOG_LEVEL: INFO

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq ripgrep tree

      - name: Install uv
        run: python3 -m pip install --user uv && echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run shared repository bootstrap
        env:
          GH_TOKEN: ${{ github.token }}
        run: /bin/bash .devcontainer/post-start.sh

      - name: Fetch upstream trainer assets (runtime overlay)
        run: |
          set -euo pipefail
          UPSTREAM_REPO="https://github.com/Tyler-R-Kendrick/copilot-auto-training.git"
          UPSTREAM_DIR="/tmp/copilot-auto-training"

          echo "==> Cloning upstream copilot-auto-training for runtime assets..."
          git clone --depth=1 --no-checkout --filter=blob:none --sparse \
            "$UPSTREAM_REPO" "$UPSTREAM_DIR"
          git -C "$UPSTREAM_DIR" sparse-checkout set \
            .github/agents \
            .github/workflows/shared \
            tools/agent-skills-mcp
          git -C "$UPSTREAM_DIR" checkout

          # Overlay agents into workspace (not committed — gitignored)
          mkdir -p "$GITHUB_WORKSPACE/.github/agents"
          cp -n "$UPSTREAM_DIR/.github/agents/"*.agent.md \
            "$GITHUB_WORKSPACE/.github/agents/" 2>/dev/null || true

          # Overlay shared fragments (not committed — gitignored)
          for f in agent-skills-runtime.md trainer-loop-contract.md; do
            src="$UPSTREAM_DIR/.github/workflows/shared/$f"
            dst="$GITHUB_WORKSPACE/.github/workflows/shared/$f"
            if [[ -f "$src" ]] && [[ ! -f "$dst" ]]; then
              cp "$src" "$dst"
            fi
          done

          # Overlay MCP server source (not committed — gitignored)
          for f in agent_skills_mcp.py server.py; do
            src="$UPSTREAM_DIR/tools/agent-skills-mcp/$f"
            dst="$GITHUB_WORKSPACE/tools/agent-skills-mcp/$f"
            if [[ -f "$src" ]] && [[ ! -f "$dst" ]]; then
              cp "$src" "$dst"
            fi
          done

          echo "==> Upstream trainer assets overlaid:"
          ls -la "$GITHUB_WORKSPACE/.github/agents/" || true
          ls -la "$GITHUB_WORKSPACE/.github/workflows/shared/" || true
          ls -la "$GITHUB_WORKSPACE/tools/agent-skills-mcp/" || true

      - name: Verify gh-aw is available
        run: gh aw --help >/dev/null

      - name: Verify act is available
        run: act --version

      - name: Wait for TerminusDB
        run: |
          python - <<'PY'
          import sys, time, urllib.request
          url = "http://127.0.0.1:6363"
          last_error = None
          for _ in range(30):
            try:
              with urllib.request.urlopen(url, timeout=2) as r:
                if 200 <= r.status < 300:
                  print(f"TerminusDB reachable at {url}")
                  sys.exit(0)
            except Exception as exc:
              last_error = exc
              time.sleep(2)
          raise SystemExit(f"Timed out waiting for TerminusDB at {url}: {last_error}")
          PY

      - name: Configure Copilot shell environment
        run: |
          {
            echo "PYTHONPATH=$GITHUB_WORKSPACE"
            echo "TERMINUSDB_URL=http://127.0.0.1:6363"
            echo "TERMINUSDB_TEAM=admin"
            echo "TERMINUSDB_DB=agent_memory"
            echo "TERMINUSDB_USER=admin"
            echo "TERMINUSDB_PASSWORD=root"
          } >> "$GITHUB_ENV"
          for file in "$HOME/.bashrc" "$HOME/.profile"; do
            {
              echo "export PYTHONPATH=$GITHUB_WORKSPACE"
              echo "export TERMINUSDB_URL=http://127.0.0.1:6363"
              echo "export TERMINUSDB_TEAM=admin"
              echo "export TERMINUSDB_DB=agent_memory"
              echo "export TERMINUSDB_USER=admin"
              echo "export TERMINUSDB_PASSWORD=root"
            } >> "$file"
          done

      - name: Verify setup
        run: |
          python - <<'PY'
          import os
          required = {
            "PYTHONPATH": os.environ["PYTHONPATH"],
            "TERMINUSDB_URL": os.environ["TERMINUSDB_URL"],
            "TERMINUSDB_TEAM": os.environ["TERMINUSDB_TEAM"],
            "TERMINUSDB_DB": os.environ["TERMINUSDB_DB"],
            "TERMINUSDB_USER": os.environ["TERMINUSDB_USER"],
            "TERMINUSDB_PASSWORD": os.environ["TERMINUSDB_PASSWORD"],
          }
          for key, value in required.items():
            print(f"{key}={value}")
          PY
          gh aw --help >/dev/null
          act --version
