name: Sync from Upstream (copilot-auto-training)

# Keeps this repository in sync with copilot-auto-training by using the
# gh-aw CLI for workflow files and a minimal sync script for the MCP server
# implementation that gh-aw does not manage.
#
# Workflow (train-prompt.lock.yml, train-prompt.md, agents, shared fragments)
#   → managed by: gh aw update train-prompt
#
# MCP server source (tools/agent-skills-mcp/agent_skills_mcp.py, server.py)
#   → managed by: .github/scripts/sync-upstream.sh
#
# Repo-specific files (pyproject.toml, repo-runtime-context.md, devcontainer,
# copilot-setup-steps.yml) are NOT synced; maintain them manually.

on:
  schedule:
    # Run daily at 03:17 UTC
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Branch/tag/SHA to sync from (default: main)"
        required: false
        default: "main"
      dry_run:
        description: "Dry run — report changes without writing files"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      UPSTREAM_REPO: Tyler-R-Kendrick/copilot-auto-training
      UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'main' }}
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gh-aw extension
        run: |
          if gh extension list 2>/dev/null | awk '{print $1}' | grep -Eq '(^|/)gh-aw$'; then
            gh extension upgrade gh-aw
          else
            gh extension install github/gh-aw
          fi
          gh aw --help >/dev/null

      - name: Update workflow via gh aw
        id: aw_update
        run: |
          if [[ "$DRY_RUN" == "1" ]]; then
            echo "DRY RUN: would run: gh aw update train-prompt"
          else
            # Install if not yet present; update if already present.
            if [[ -f ".github/workflows/train-prompt.lock.yml" ]]; then
              gh aw update train-prompt
            else
              gh aw add \
                "Tyler-R-Kendrick/copilot-auto-training/.github/workflows/train-prompt.md" \
                --name train-prompt
            fi
          fi

      - name: Sync MCP server source files
        id: sync_mcp
        run: |
          bash .github/scripts/sync-upstream.sh

      - name: Check for changes
        id: changed
        run: |
          git diff --name-only > /tmp/git-changed.txt
          count=$(wc -l < /tmp/git-changed.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [[ "$count" -gt 0 ]]; then
            echo "Changed files:"
            cat /tmp/git-changed.txt
          else
            echo "No changes detected."
          fi

      - name: Regenerate uv.lock if MCP sources changed
        if: steps.changed.outputs.count != '0' && env.DRY_RUN == '0'
        run: |
          if git diff --name-only | grep -q 'tools/agent-skills-mcp/'; then
            python3 -m pip install --quiet uv
            uv lock --directory tools/agent-skills-mcp
          fi

      - name: Open pull request
        if: steps.changed.outputs.count != '0' && env.DRY_RUN == '0'
        run: |
          BRANCH="chore/sync-upstream-$(date +%Y%m%d-%H%M%S)"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: sync from ${UPSTREAM_REPO}@${UPSTREAM_REF}"
          git push origin "$BRANCH"

          BODY="## Upstream sync from \`${UPSTREAM_REPO}\` @ \`${UPSTREAM_REF}\`

          This PR was opened automatically by the **Sync from Upstream** workflow.

          ### How each file was updated
          - **Workflow files** (\`train-prompt.lock.yml\`, \`train-prompt.md\`, agents, shared fragments)
            updated via \`gh aw update train-prompt\`
          - **MCP server source** (\`agent_skills_mcp.py\`, \`server.py\`)
            updated via \`.github/scripts/sync-upstream.sh\`

          ### Changed files
          $(cat /tmp/git-changed.txt | sed 's/^/- /')

          ### Review checklist
          - [ ] Confirm each changed file is an expected upstream update
          - [ ] Verify \`tools/agent-skills-mcp/pyproject.toml\` and
                \`.github/workflows/shared/repo-runtime-context.md\` are **not** in this PR
          - [ ] Run \`uv lock --directory tools/agent-skills-mcp\` locally if MCP sources changed"

          gh pr create \
            --title "chore: sync from ${UPSTREAM_REPO}@${UPSTREAM_REF}" \
            --body "$BODY" \
            --label "upstream-sync" \
            --head "$BRANCH"
