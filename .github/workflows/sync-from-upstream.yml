name: Sync from Upstream (copilot-auto-training)

# Recompiles our authored train-prompt.md and daily-feature-extraction.md
# lock files.  The upstream copilot-auto-training repo provides trainer
# agents, shared fragments, and MCP server source — those are fetched at
# workflow runtime, NOT committed to this repo.
#
# This workflow ensures our compiled .lock.yml files stay current with the
# latest gh-aw compiler version.

on:
  schedule:
    # Run daily at 03:17 UTC
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — report changes without opening a PR"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gh-aw extension
        run: |
          if gh extension list 2>/dev/null | awk '{print $1}' | grep -Eq '(^|/)gh-aw$'; then
            gh extension upgrade gh-aw
          else
            gh extension install github/gh-aw
          fi
          gh aw --help >/dev/null

      - name: Recompile gh-aw workflow lock files
        run: |
          set -euo pipefail
          shopt -s nullglob

          mapfile -t workflows < <(
            find .github/workflows -maxdepth 1 -type f -name '*.md' -printf '%f\n' | sort
          )

          if [[ ${#workflows[@]} -eq 0 ]]; then
            echo "No gh-aw workflow sources found."
            exit 0
          fi

          for workflow in "${workflows[@]}"; do
            name="${workflow%.md}"
            echo "==> Compiling $workflow → $name.lock.yml"
            if [[ "$DRY_RUN" == "1" ]]; then
              echo "    DRY RUN: would run gh aw compile $name"
            else
              gh aw compile "$name" || echo "    WARNING: compile failed for $name"
            fi
          done

      - name: Check for changes
        id: changed
        run: |
          git diff --name-only > /tmp/git-changed.txt
          count=$(wc -l < /tmp/git-changed.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [[ "$count" -gt 0 ]]; then
            echo "Changed files:"
            cat /tmp/git-changed.txt
          else
            echo "No changes detected."
          fi

      - name: Open pull request
        if: steps.changed.outputs.count != '0' && env.DRY_RUN == '0'
        run: |
          BRANCH="chore/sync-upstream-$(date +%Y%m%d-%H%M%S)"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: recompile gh-aw workflow lock files"
          git push origin "$BRANCH"

          BODY="## Recompiled gh-aw workflow lock files

          This PR was opened automatically by the **Sync from Upstream** workflow.
          The lock files were regenerated by \`gh aw compile\` to pick up any
          compiler or runtime changes.

          ### Changed files
          $(cat /tmp/git-changed.txt | sed 's/^/- /')

          ### Review checklist
          - [ ] Confirm each lock file was regenerated by \`gh aw compile\`
          - [ ] Verify train-prompt.md was NOT modified (it is authored in this repo)"

          gh pr create \
            --title "chore: recompile gh-aw workflow lock files" \
            --body "$BODY" \
            --label "upstream-sync" \
            --head "$BRANCH"
