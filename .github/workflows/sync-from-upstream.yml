name: Sync from Upstream (copilot-auto-training)

# Keeps the train-prompt workflow in sync with the upstream
# copilot-auto-training repository using `gh aw update train-prompt`.
#
# `gh aw update` regenerates .github/workflows/train-prompt.lock.yml and the
# agent/shared files that the workflow imports.  Any resulting diff is opened
# as a pull request for maintainer review.
#
# Nothing in this workflow downloads or copies raw upstream files.
# The MCP server source (tools/agent-skills-mcp/agent_skills_mcp.py,
# server.py) is fetched at runtime by .devcontainer/post-start.sh and is
# gitignored.

on:
  schedule:
    # Run daily at 03:17 UTC
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — report changes without writing files or opening a PR"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gh-aw extension
        run: |
          if gh extension list 2>/dev/null | awk '{print $1}' | grep -Eq '(^|/)gh-aw$'; then
            gh extension upgrade gh-aw
          else
            gh extension install github/gh-aw
          fi
          gh aw --help >/dev/null

      - name: Install or update workflow via gh aw
        run: |
          if [[ "$DRY_RUN" == "1" ]]; then
            echo "DRY RUN: would run gh aw add / gh aw update train-prompt"
            exit 0
          fi
          if [[ -f ".github/workflows/train-prompt.lock.yml" ]]; then
            gh aw update train-prompt
          else
            gh aw add \
              "Tyler-R-Kendrick/copilot-auto-training/.github/workflows/train-prompt.md" \
              --name train-prompt
          fi

      - name: Check for changes
        id: changed
        run: |
          git diff --name-only > /tmp/git-changed.txt
          count=$(wc -l < /tmp/git-changed.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [[ "$count" -gt 0 ]]; then
            echo "Changed files:"
            cat /tmp/git-changed.txt
          else
            echo "No changes detected."
          fi

      - name: Open pull request
        if: steps.changed.outputs.count != '0' && env.DRY_RUN == '0'
        run: |
          BRANCH="chore/sync-upstream-$(date +%Y%m%d-%H%M%S)"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: update train-prompt workflow via gh aw update"
          git push origin "$BRANCH"

          BODY="## Upstream sync via \`gh aw update train-prompt\`

          This PR was opened automatically by the **Sync from Upstream** workflow.
          All changes were generated by \`gh aw update train-prompt\` — no files
          were manually downloaded or copied.

          ### Changed files
          $(cat /tmp/git-changed.txt | sed 's/^/- /')

          ### Review checklist
          - [ ] Confirm each changed file was generated by \`gh aw update\` (not manual edits)
          - [ ] Verify the compiled lock file reflects the latest upstream source"

          gh pr create \
            --title "chore: update train-prompt workflow via gh aw update" \
            --body "$BODY" \
            --label "upstream-sync" \
            --head "$BRANCH"
